  # ┌─────────────────────────────────────────────────────────────────────┐
  # │  DATABASE NOTE                                                      │
  # │  This compose file includes a local Postgres for offline / dev use. │
  # │  For production, set DATABASE_URL to your Supabase Session Pooler   │
  # │  URI and DATABASE_DIRECT_URL to the direct connection URI.          │
  # │  See backend/.env.example for the full template.                    │
  # │  When using Supabase you can comment out the postgres service.      │
  # └─────────────────────────────────────────────────────────────────────┘

services:
  # api:
  #   build: .
  #   ports:
  #     - "8000:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #   command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Local Postgres — not needed when using Supabase as the main database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prepflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional services — start with: docker compose --profile full up
  redis:
    profiles: [full]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    profiles: [full]
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbuckets:
    profiles: [full]
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/osms --ignore-existing;
      mc anonymous set download myminio/osms;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
